name: LearningSteps CD
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/learningsteps:${{ github.sha }} .

      - name: Trivy scan (GATE — fails on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ secrets.ACR_LOGIN_SERVER }}/learningsteps:${{ github.sha }}'
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push to ACR
        if: success()
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/learningsteps:${{ github.sha }}